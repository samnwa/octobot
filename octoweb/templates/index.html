<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octobot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-left">
                <div class="header-info">
                    <h1>OCTOBOT</h1>
                    <span class="header-meta">
                        <span id="model-trigger" class="model-trigger" title="Click to switch model"><span id="current-model">{{ model }}</span> <span class="model-caret">&#9662;</span></span>
                        &middot; {{ tool_count }} tools
                    </span>
                    <div id="model-dropdown" class="model-dropdown hidden">
                        <div class="model-dropdown-header">Switch Model</div>
                        <div id="model-list" class="model-list">
                            <div class="model-loading">Loading models...</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <span id="token-display" class="token-display"></span>
                <div class="cmd-wrapper">
                    <button id="cmd-btn" class="icon-btn" title="Commands">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M1 3.5l4.5 4.5-4.5 4.5L2.5 14 8 8.5 2.5 3z"/>
                            <path d="M8 13h6v-1H8z"/>
                        </svg>
                    </button>
                    <div id="cmd-dropdown" class="cmd-dropdown hidden">
                        <div class="cmd-dropdown-header">Commands</div>
                    </div>
                </div>
                <button id="files-btn" class="icon-btn" title="File browser">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M1.5 1A1.5 1.5 0 000 2.5v11A1.5 1.5 0 001.5 15h13a1.5 1.5 0 001.5-1.5v-9A1.5 1.5 0 0014.5 3H7.71a1 1 0 01-.71-.29L5.59 1.29A1 1 0 004.88 1z"/>
                    </svg>
                </button>
                <button id="reset-btn" title="Reset conversation">Reset</button>
            </div>
        </header>

        <div class="main-layout">
            <main id="messages">
                <div class="welcome-message">
                    <p>Ask me anything. I can read and write files, run commands, search the web, automate browsers, and more.</p>
                </div>
            </main>

            <aside id="file-panel" class="file-panel hidden">
                <div class="panel-header">
                    <span class="panel-title">Files</span>
                    <button id="panel-close" class="icon-btn panel-close-btn" title="Close">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                            <path d="M1.7 1.7a1 1 0 011.4 0L7 5.6l3.9-3.9a1 1 0 111.4 1.4L8.4 7l3.9 3.9a1 1 0 01-1.4 1.4L7 8.4l-3.9 3.9a1 1 0 01-1.4-1.4L5.6 7 1.7 3.1a1 1 0 010-1.4z"/>
                        </svg>
                    </button>
                </div>
                <div class="panel-controls">
                    <label class="checkbox-label">
                        <input type="checkbox" id="hide-core" checked>
                        <span>Hide core files</span>
                    </label>
                    <button id="refresh-files" class="icon-btn" title="Refresh">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                            <path d="M7 1a6 6 0 105.2 3h-1.5A4.5 4.5 0 107 2.5V5l3-3-3-3v2z"/>
                        </svg>
                    </button>
                </div>
                <div id="file-tree" class="file-tree"></div>
            </aside>
        </div>

        <div id="file-viewer" class="file-viewer hidden">
            <div class="viewer-header">
                <span id="viewer-path" class="viewer-path"></span>
                <button id="viewer-close" class="icon-btn" title="Close">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                        <path d="M1.7 1.7a1 1 0 011.4 0L7 5.6l3.9-3.9a1 1 0 111.4 1.4L8.4 7l3.9 3.9a1 1 0 01-1.4 1.4L7 8.4l-3.9 3.9a1 1 0 01-1.4-1.4L5.6 7 1.7 3.1a1 1 0 010-1.4z"/>
                    </svg>
                </button>
            </div>
            <pre id="viewer-content" class="viewer-content"><code></code></pre>
        </div>

        <div id="cmd-autocomplete" class="cmd-autocomplete hidden"></div>

        <div id="swimming-octopus" class="swimming-octopus hidden">
            <svg class="swimmer-svg" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="60" cy="32" rx="28" ry="24" fill="#00ffff" opacity="0.85"/>
                <circle cx="50" cy="28" r="5" fill="#0d1117"/>
                <circle cx="70" cy="28" r="5" fill="#0d1117"/>
                <circle cx="51" cy="27" r="2" fill="white"/>
                <circle cx="71" cy="27" r="2" fill="white"/>
                <ellipse cx="60" cy="38" rx="4" ry="2" fill="#0d1117" opacity="0.6"/>
                <path d="M32,50 Q20,65 15,85" stroke="#00ffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7">
                    <animate attributeName="d" values="M32,50 Q20,65 15,85;M32,50 Q25,70 22,85;M32,50 Q20,65 15,85" dur="1.2s" repeatCount="indefinite"/>
                </path>
                <path d="M40,52 Q30,70 28,90" stroke="#00ffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7">
                    <animate attributeName="d" values="M40,52 Q30,70 28,90;M40,52 Q35,75 35,90;M40,52 Q30,70 28,90" dur="1.4s" repeatCount="indefinite"/>
                </path>
                <path d="M52,55 Q48,75 42,92" stroke="#00ffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7">
                    <animate attributeName="d" values="M52,55 Q48,75 42,92;M52,55 Q52,78 50,92;M52,55 Q48,75 42,92" dur="1.1s" repeatCount="indefinite"/>
                </path>
                <path d="M68,55 Q72,75 78,92" stroke="#00ffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7">
                    <animate attributeName="d" values="M68,55 Q72,75 78,92;M68,55 Q68,78 70,92;M68,55 Q72,75 78,92" dur="1.3s" repeatCount="indefinite"/>
                </path>
                <path d="M80,52 Q90,70 92,90" stroke="#00ffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7">
                    <animate attributeName="d" values="M80,52 Q90,70 92,90;M80,52 Q85,75 85,90;M80,52 Q90,70 92,90" dur="1.5s" repeatCount="indefinite"/>
                </path>
                <path d="M88,50 Q100,65 105,85" stroke="#00ffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7">
                    <animate attributeName="d" values="M88,50 Q100,65 105,85;M88,50 Q95,70 98,85;M88,50 Q100,65 105,85" dur="1.0s" repeatCount="indefinite"/>
                </path>
            </svg>
        </div>

        <footer>
            <form id="chat-form">
                <input type="text" id="message-input" placeholder="Type your message... (/ for commands)" autocomplete="off" autofocus>
                <button type="submit" id="send-btn">Send</button>
            </form>
        </footer>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
