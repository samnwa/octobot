<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthChat</title>
    <meta name="description" content="Multi-agent AI workspace where specialized agents collaborate on your tasks">
    <meta name="theme-color" content="#00e5c8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SynthChat">
    <link rel="manifest" href="{{ url_for('synthchat.static', filename='manifest.json') }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('synthchat.static', filename='icon-192.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('synthchat.static', filename='icon-192.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('synthchat.static', filename='style.css') }}?v=10">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="workspace">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/" class="back-link" title="Back to Octobot">&#8592;</a>
                <span class="ws-icon">🐙</span>
                <span class="ws-name">SynthChat</span>
            </div>

            <div class="sidebar-section">
                <div class="section-label">
                    Channels
                    <button class="add-channel-btn" id="add-channel-btn" title="Create channel">+</button>
                </div>
                <div id="channel-list" class="channel-list"></div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">
                    Agents
                    <button class="create-agent-btn" id="create-agent-btn" title="Create agent">+</button>
                </div>
                <div id="agent-list" class="agent-list"></div>
            </div>

            <div class="sidebar-section" id="files-section" style="display:none">
                <div class="section-label section-label-toggle" id="files-toggle">
                    Files
                    <span class="file-count" id="file-count"></span>
                </div>
                <div id="file-list" class="file-list"></div>
            </div>

            <div class="sidebar-section" id="schedules-section" style="display:none">
                <div class="section-label section-label-toggle" id="schedules-toggle">
                    Schedules
                    <span class="schedule-count" id="schedule-count"></span>
                </div>
                <div id="schedule-list" class="schedule-list"></div>
            </div>

            <div class="sidebar-bottom">
                <button class="library-btn" id="library-btn" title="Agent Library">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    Library
                </button>
            </div>
        </aside>

        <main class="main-area">
            <header class="channel-header">
                <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
                <div class="channel-info">
                    <h1 class="channel-title" id="channel-title"># workspace</h1>
                    <span class="channel-meta" id="channel-meta">6 agents online</span>
                </div>
            </header>

            <div class="message-feed" id="message-feed">
                <div class="feed-start">
                    <div class="feed-start-icon">🐙</div>
                    <h2>Welcome to #workspace</h2>
                    <p>This is where agents collaborate on your tasks. Send a message to get started.</p>
                </div>
            </div>

            <div class="typing-area" id="typing-area"></div>

            <footer class="input-bar">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Message #workspace..." rows="1"></textarea>
                    <button id="send-btn" title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <div class="modal-overlay" id="create-channel-modal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h3>Create Channel</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <label class="modal-label">Channel Name</label>
                <input type="text" id="channel-name-input" class="modal-input" placeholder="e.g. research, scheduling" maxlength="30">
                <label class="modal-label">Description (optional)</label>
                <input type="text" id="channel-desc-input" class="modal-input" placeholder="What is this channel for?">
                <label class="modal-label">Agents</label>
                <div id="agent-checkboxes" class="agent-checkboxes"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
                <button class="modal-btn modal-btn-create" id="modal-create">Create</button>
            </div>
        </div>
    </div>

    <div class="profile-overlay" id="profile-overlay"></div>
    <div class="profile-panel" id="profile-panel">
        <div class="profile-panel-header">
            <h3>Agent Profile</h3>
            <button class="modal-close" id="profile-close">&times;</button>
        </div>
        <div class="profile-panel-body" id="profile-panel-body"></div>
    </div>

    <div class="modal-overlay" id="create-agent-modal" style="display:none">
        <div class="modal agent-modal">
            <div class="modal-header">
                <h3 id="agent-modal-title">Create Agent</h3>
                <button class="modal-close" id="agent-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <label class="modal-label">Name</label>
                <input type="text" id="agent-name-input" class="modal-input" placeholder="e.g. DataAnalyst" maxlength="30">

                <label class="modal-label">Role</label>
                <input type="text" id="agent-role-input" class="modal-input" placeholder="e.g. Data Analyst" maxlength="40">

                <label class="modal-label">Description</label>
                <textarea id="agent-desc-input" class="modal-input agent-textarea-sm" placeholder="What does this agent do?" rows="2"></textarea>

                <div class="agent-form-row">
                    <div class="agent-form-col">
                        <label class="modal-label">Avatar (emoji)</label>
                        <div class="avatar-input-wrapper">
                            <input type="text" id="agent-avatar-input" class="modal-input avatar-input" placeholder="🤖" maxlength="4">
                            <span class="avatar-preview" id="avatar-preview">🤖</span>
                        </div>
                    </div>
                    <div class="agent-form-col">
                        <label class="modal-label">Color</label>
                        <div class="color-swatches" id="color-swatches">
                            <button class="color-swatch active" data-color="#4ade80" style="background:#4ade80"></button>
                            <button class="color-swatch" data-color="#fb923c" style="background:#fb923c"></button>
                            <button class="color-swatch" data-color="#c084fc" style="background:#c084fc"></button>
                            <button class="color-swatch" data-color="#f472b6" style="background:#f472b6"></button>
                            <button class="color-swatch" data-color="#818cf8" style="background:#818cf8"></button>
                            <button class="color-swatch" data-color="#22d3ee" style="background:#22d3ee"></button>
                            <button class="color-swatch" data-color="#fbbf24" style="background:#fbbf24"></button>
                            <button class="color-swatch" data-color="#f87171" style="background:#f87171"></button>
                            <button class="color-swatch" data-color="#a3e635" style="background:#a3e635"></button>
                            <button class="color-swatch" data-color="#e879f9" style="background:#e879f9"></button>
                        </div>
                        <input type="text" id="agent-color-input" class="modal-input color-hex-input" placeholder="#6b7280" maxlength="7">
                    </div>
                </div>

                <label class="modal-label">Tools</label>
                <div id="agent-tools-checkboxes" class="agent-tools-grid"></div>

                <label class="modal-label">Skills</label>
                <div id="agent-skills-checkboxes" class="agent-skills-list"></div>

                <label class="modal-label">System Prompt</label>
                <textarea id="agent-system-input" class="modal-input agent-textarea-lg" placeholder="You are..." rows="6"></textarea>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="agent-modal-cancel">Cancel</button>
                <button class="modal-btn modal-btn-create" id="agent-modal-save">Create Agent</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay library-overlay" id="library-modal" style="display:none">
        <div class="library-panel">
            <div class="library-header">
                <h2>Agent Library</h2>
                <button class="modal-close" id="library-close">&times;</button>
            </div>
            <div class="library-tabs">
                <button class="library-tab active" data-tab="my-agents">My Agents</button>
                <button class="library-tab" data-tab="community">Community</button>
                <button class="library-tab" data-tab="skills">Skills</button>
            </div>
            <div class="library-body" id="library-body">
                <div class="library-tab-content active" id="tab-my-agents"></div>
                <div class="library-tab-content" id="tab-community"></div>
                <div class="library-tab-content" id="tab-skills"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('synthchat.static', filename='app.js') }}?v=10"></script>
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("{{ url_for('synthchat.service_worker') }}", { scope: "/synthchat/" });
    }
    </script>
</body>
</html>
